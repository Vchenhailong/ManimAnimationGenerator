[CLI]
quality = medium_quality
preview = False
disable_caching = True
media_dir = outputs

[CLI.quality]
low_quality = 854x480
low_quality_fps = 25
medium_quality = 1280x720
medium_quality_fps = 30
high_quality = 1920x1080
high_quality_fps = 60
fourk_quality = 3840x2160
fourk_quality_fps = 60

[CLI.ffmpeg]
audio_codec = aac
video_codec = libx264
pixel_format = yuv420p

[CLI.text]
font = Noto Sans CJK SC

[CLI.camera]
background_color = #000000

[CLI.latex]
engine = xelatex
use_ctex = True

[CustomColors]
background = #000000
default = #FFFFFF
emphasis = #66DDFF
highlight = #FFDD66